<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#1B1F1C" />
<title>MenuLens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
    body {
        margin: 0;
            background: #F7F3E9;
                font-family: 'Instrument Sans', sans-serif;
                    color: #1B1F1C;
                      }
                        .page { min-height: 100vh; display: flex; flex-direction: column; }
                          header {
                              background: #1B1F1C;
                                  padding: 16px 20px 14px;
                                      position: sticky;
                                          top: 0;
                                              z-index: 10;
                                                }
                                                  .header-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
                                                    h1 {
                                                        font-family: 'Fraunces', serif;
                                                            font-weight: 500;
                                                                font-size: 19px;
                                                                    color: #F7F3E9;
                                                                        letter-spacing: 0.01em;
                                                                            margin: 0;
                                                                              }
                                                                                .lang-picker { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
                                                                                  .lang-label { font-size: 12px; color: #9AA69A; letter-spacing: 0.02em; }
                                                                                    select, input[type=password], input[type=text] {
                                                                                        background: transparent;
                                                                                            border: 1px solid #3A413B;
                                                                                                border-radius: 6px;
                                                                                                    color: #F7F3E9;
                                                                                                        font-size: 13px;
                                                                                                            font-family: 'Instrument Sans', sans-serif;
                                                                                                                padding: 5px 10px;
                                                                                                                    outline: none;
                                                                                                                      }
                                                                                                                        main {
                                                                                                                            flex: 1;
                                                                                                                                padding: 24px 20px 40px;
                                                                                                                                    max-width: 480px;
                                                                                                                                        margin: 0 auto;
                                                                                                                                            width: 100%;
                                                                                                                                              }
                                                                                                                                                .empty-state {
                                                                                                                                                    display: flex;
                                                                                                                                                        flex-direction: column;
                                                                                                                                                            align-items: center;
                                                                                                                                                                text-align: center;
                                                                                                                                                                    padding-top: 14vh;
                                                                                                                                                                        gap: 18px;
                                                                                                                                                                          }
                                                                                                                                                                            .empty-icon {
                                                                                                                                                                                width: 72px; height: 72px;
                                                                                                                                                                                    border-radius: 50%;
                                                                                                                                                                                        background: #EDE7D6;
                                                                                                                                                                                            border: 1px solid #DCD3B8;
                                                                                                                                                                                                display: flex; align-items: center; justify-content: center;
                                                                                                                                                                                                  }
                                                                                                                                                                                                    .empty-text { font-size: 15px; color: #4A4F49; line-height: 1.5; margin: 0; }
                                                                                                                                                                                                      .btn-primary {
                                                                                                                                                                                                          display: flex; align-items: center; gap: 8px;
                                                                                                                                                                                                              background: #C9432B; color: #F7F3E9;
                                                                                                                                                                                                                  font-size: 15px; font-weight: 600;
                                                                                                                                                                                                                      padding: 13px 26px; border-radius: 999px;
                                                                                                                                                                                                                          border: none; cursor: pointer;
                                                                                                                                                                                                                            }
                                                                                                                                                                                                                              .btn-secondary {
                                                                                                                                                                                                                                  display: flex; align-items: center; gap: 7px;
                                                                                                                                                                                                                                      background: transparent; color: #5B7A5B;
                                                                                                                                                                                                                                          font-size: 14px; font-weight: 500;
                                                                                                                                                                                                                                              padding: 8px 16px; border: none; cursor: pointer;
                                                                                                                                                                                                                                                  text-decoration: underline; text-underline-offset: 3px;
                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                      .preview-wrap { display: flex; flex-direction: column; align-items: center; gap: 18px; }
                                                                                                                                                                                                                                                        .image-frame {
                                                                                                                                                                                                                                                            position: relative; width: 100%;
                                                                                                                                                                                                                                                                border-radius: 10px; overflow: hidden;
                                                                                                                                                                                                                                                                    border: 1px solid #DCD3B8;
                                                                                                                                                                                                                                                                        box-shadow: 0 4px 16px rgba(27,31,28,0.08);
                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                            .image-frame img { width: 100%; display: block; }
                                                                                                                                                                                                                                                                              .close-btn {
                                                                                                                                                                                                                                                                                  position: absolute; top: 10px; right: 10px;
                                                                                                                                                                                                                                                                                      width: 30px; height: 30px; border-radius: 50%;
                                                                                                                                                                                                                                                                                          background: #F7F3E9; border: none;
                                                                                                                                                                                                                                                                                              display: flex; align-items: center; justify-content: center;
                                                                                                                                                                                                                                                                                                  cursor: pointer; font-size: 16px; color: #1B1F1C;
                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                      .btn-scan {
                                                                                                                                                                                                                                                                                                          background: #C9432B; color: #F7F3E9;
                                                                                                                                                                                                                                                                                                              font-size: 15px; font-weight: 600;
                                                                                                                                                                                                                                                                                                                  padding: 13px 30px; border-radius: 999px;
                                                                                                                                                                                                                                                                                                                      border: none; cursor: pointer; width: 100%;
                                                                                                                                                                                                                                                                                                                        }
                                                                                                                                                                                                                                                                                                                          .loading-row { display: flex; align-items: center; gap: 10px; }
                                                                                                                                                                                                                                                                                                                            .spinner {
                                                                                                                                                                                                                                                                                                                                width: 18px; height: 18px;
                                                                                                                                                                                                                                                                                                                                    border: 2px solid #DCD3B8; border-top-color: #C9432B;
                                                                                                                                                                                                                                                                                                                                        border-radius: 50%; animation: spin 0.8s linear infinite;
                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                            @keyframes spin { to { transform: rotate(360deg); } }
                                                                                                                                                                                                                                                                                                                                              .loading-text { font-size: 14px; color: #4A4F49; }
                                                                                                                                                                                                                                                                                                                                                .error-box { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
                                                                                                                                                                                                                                                                                                                                                  .error-text { font-size: 14px; color: #C9432B; text-align: center; margin: 0; }
                                                                                                                                                                                                                                                                                                                                                    .results-header {
                                                                                                                                                                                                                                                                                                                                                        display: flex; align-items: center; gap: 12px;
                                                                                                                                                                                                                                                                                                                                                            padding-bottom: 18px; margin-bottom: 6px;
                                                                                                                                                                                                                                                                                                                                                                border-bottom: 1px solid #DCD3B8;
                                                                                                                                                                                                                                                                                                                                                                  }
                                                                                                                                                                                                                                                                                                                                                                    .mini-thumb { width: 44px; height: 44px; border-radius: 6px; overflow: hidden; flex-shrink: 0; border: 1px solid #DCD3B8; }
                                                                                                                                                                                                                                                                                                                                                                      .mini-thumb img { width: 100%; height: 100%; object-fit: cover; }
                                                                                                                                                                                                                                                                                                                                                                        .detected-label { font-size: 11px; color: #8A9089; margin: 0; letter-spacing: 0.02em; text-transform: uppercase; }
                                                                                                                                                                                                                                                                                                                                                                          .detected-lang { font-size: 14px; color: #1B1F1C; margin: 0; font-weight: 600; }
                                                                                                                                                                                                                                                                                                                                                                            .btn-new-scan {
                                                                                                                                                                                                                                                                                                                                                                                margin-left: auto; background: transparent;
                                                                                                                                                                                                                                                                                                                                                                                    border: 1px solid #C9432B; color: #C9432B;
                                                                                                                                                                                                                                                                                                                                                                                        font-size: 12.5px; font-weight: 600;
                                                                                                                                                                                                                                                                                                                                                                                            padding: 7px 14px; border-radius: 999px; cursor: pointer; white-space: nowrap;
                                                                                                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                                                                                                                .no-items { font-size: 14px; color: #4A4F49; text-align: center; padding: 30px 10px; }
                                                                                                                                                                                                                                                                                                                                                                                                  ul.list { list-style: none; margin: 0; padding: 0; }
                                                                                                                                                                                                                                                                                                                                                                                                    .list-item { border-bottom: 1px dashed #DCD3B8; }
                                                                                                                                                                                                                                                                                                                                                                                                      .item-row {
                                                                                                                                                                                                                                                                                                                                                                                                          width: 100%; display: flex; align-items: flex-start; justify-content: space-between;
                                                                                                                                                                                                                                                                                                                                                                                                              gap: 12px; background: none; border: none; padding: 16px 2px;
                                                                                                                                                                                                                                                                                                                                                                                                                  cursor: pointer; text-align: left; font-family: inherit;
                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                      .item-text { display: flex; flex-direction: column; gap: 3px; }
                                                                                                                                                                                                                                                                                                                                                                                                                        .item-original { font-family: 'Fraunces', serif; font-size: 16.5px; font-weight: 500; color: #1B1F1C; margin: 0; line-height: 1.3; }
                                                                                                                                                                                                                                                                                                                                                                                                                          .item-translated { font-size: 13px; color: #5B7A5B; margin: 0; font-weight: 500; }
                                                                                                                                                                                                                                                                                                                                                                                                                            .item-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; margin-top: 2px; }
                                                                                                                                                                                                                                                                                                                                                                                                                              .item-price { font-size: 13px; color: #D4AF6A; font-weight: 600; background: #1B1F1C; padding: 2px 8px; border-radius: 5px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                .chevron { transition: transform 0.2s ease; color: #5B7A5B; }
                                                                                                                                                                                                                                                                                                                                                                                                                                  .chevron.open { transform: rotate(180deg); }
                                                                                                                                                                                                                                                                                                                                                                                                                                    .explanation { font-size: 13.5px; color: #4A4F49; line-height: 1.55; margin: 0 2px 16px; padding-left: 12px; border-left: 2px solid #D4AF6A; }
                                                                                                                                                                                                                                                                                                                                                                                                                                      .key-banner {
                                                                                                                                                                                                                                                                                                                                                                                                                                          background: #EDE7D6; border: 1px solid #DCD3B8; border-radius: 10px;
                                                                                                                                                                                                                                                                                                                                                                                                                                              padding: 16px; margin-bottom: 20px; font-size: 13px; color: #4A4F49; line-height: 1.5;
                                                                                                                                                                                                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                                                                                                                                                                                                  .key-banner a { color: #C9432B; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                    .key-row { display: flex; gap: 8px; margin-top: 10px; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                      .key-row input { flex: 1; border-color: #C9432B; color: #1B1F1C; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        .key-row button { background: #1B1F1C; color: #F7F3E9; border: none; border-radius: 6px; padding: 0 14px; font-size: 13px; cursor: pointer; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                        </style>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        </head>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="page">
                                                                                                                                                                                                                                                                                                                                                                                                                                                          <header>
                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="header-row">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <span style="font-size:18px;">🍽️</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <h1>MenuLens</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="lang-picker">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <span class="lang-label">vertaal naar</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <select id="targetLang"></select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </header>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <main id="main"></main>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const LANGUAGES = ["Nederlands","English","Français","Deutsch","Español","Italiano","Português","日本語","中文","한국어"];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      const MODEL = "openrouter/free"; // gratis OpenRouter-model — laat de ":free"-suffix altijd staan

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      let state = {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        image: null,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          status: "idle",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            items: [],
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              menuLang: "",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                errorMsg: "",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  openIdx: null,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function getApiKey() { return localStorage.getItem("openrouter_key") || ""; }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function setApiKey(k) { localStorage.setItem("openrouter_key", k); }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  const targetLangSelect = document.getElementById("targetLang");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  LANGUAGES.forEach(l => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const opt = document.createElement("option");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      opt.value = l; opt.textContent = l;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (l === "Nederlands") opt.selected = true;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          targetLangSelect.appendChild(opt);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          function render() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const main = document.getElementById("main");
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const apiKey = getApiKey();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  let html = "";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!apiKey) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        html += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="key-banner">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      Voer je gratis <a href="https://openrouter.ai/keys" target="_blank">OpenRouter API-key</a> in om te starten. Deze wordt enkel lokaal op je toestel bewaard.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="key-row">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <input type="password" id="keyInput" placeholder="sk-or-..." />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <button onclick="saveKey()">Opslaan</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    if (!state.image) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        html += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="empty-state">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <div class="empty-icon">📷</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <p class="empty-text">Maak een foto van een menukaart<br/>in eender welke taal</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <input type="file" accept="image/*" capture="environment" style="display:none" id="cameraInput" onchange="handleFile(event)" />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <label for="cameraInput" class="btn-primary">📷 Foto nemen</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <input type="file" accept="image/*" style="display:none" id="uploadInput" onchange="handleFile(event)" />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <label for="uploadInput" class="btn-secondary">Kies uit galerij</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      } else if (state.status !== "done") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          html += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="preview-wrap">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="image-frame">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <img src="${state.image}" alt="Menu" />
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="close-btn" onclick="resetAll()">✕</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if (state.status === "idle") {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              html += `<button class="btn-scan" onclick="scanMenu()">Scan &amp; vertaal menu</button>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  } else if (state.status === "loading") {
